[workspace]
channels = ["nvidia", "conda-forge"]
name = "sSR-mamba"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.10.*"
opencv = ">=4.12.0,<5"
h5py = ">=3.15.1,<4"
scipy = ">=1.15.2,<2"
tifffile = "*"
imageio = ">=2.37.0,<3"
hdf5storage = ">=0.1.19,<0.2"
matplotlib = ">=3.10.8,<4"

[pypi-dependencies]
thop = ">=0.1.1.post2209072238, <0.2"
einops = ">=0.8.0"
timm = ">=1.0.0"
scikit-image = "*"
transformers = "<4.39.0"

# GPU 环境：使用 CUDA 12.4 的 PyPI 轮子

[feature.gpu]
system-requirements = { cuda = "12.4" }

# Conda 依赖：只放编译工具，不放 Python 库
[feature.gpu.dependencies]
cuda-nvcc = { version = "12.4.*", channel = "nvidia" }
gxx_linux-64 = ">=11"
ninja = "*"

# PyPI 依赖：放 PyTorch 和 Mamba
# 这样 Mamba 就会从 PyPI 下载源码，并使用上面的 nvcc 编译，完美适配 PyTorch 2.4
[feature.gpu.pypi-dependencies]
torch = { version = "==2.4.0", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = "==0.19.0", index = "https://download.pytorch.org/whl/cu124" }
torchaudio = { version = "==2.4.0", index = "https://download.pytorch.org/whl/cu124" }

causal-conv1d = { path = "./src/mamba_wheels/causal_conv1d-1.5.3.post1+cu12torch2.4cxx11abiFALSE-cp310-cp310-linux_x86_64.whl"}
mamba-ssm = { path = "./src/mamba_wheels/mamba_ssm-2.2.6.post2+cu12torch2.4cxx11abiFALSE-cp310-cp310-linux_x86_64.whl"}

# CPU 环境配置 (保持不变)
[feature.cpu.pypi-dependencies]
torch = { version = "==2.4.0", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = "==0.19.0", index = "https://download.pytorch.org/whl/cpu" }
torchaudio = { version = "==2.4.0", index = "https://download.pytorch.org/whl/cpu" }

[environments]

gpu = { features = ["gpu"] }

# 默认用 CPU 环境

default = { features = ["cpu"] }
